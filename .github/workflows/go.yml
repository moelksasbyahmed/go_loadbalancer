name : LB_ROCK CI 

on : 
  push:
   branches : 
     - main 
     
  pull_request:
    branches : 
      - main
jobs :
  build :
    strategy : 
      matrix : 
       go-version : [1.21, 1.20, 1.19]
       os : [ubuntu-latest , windows-latest , macos-latest]
    runs-on : ${{ matrix.os }}
    steps :
      - uses : actions/checkout@v2
      - name : Set up Go Environment on ${{ matrix.os }}
        uses : actions/setup-go@v2
        with :
          go-version : ${{ matrix.go-version }}
      - name : Build
        
        run : >
          echo "Building on ${{ matrix.os }} with Go ${{ matrix.go-version }}" &&
          go build -v ./...
      - name : Test
        run : >
          echo "Testing on ${{ matrix.os }} with Go ${{ matrix.go-version }}" &&
          go test -v ./...
