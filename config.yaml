adminconfig:
    host: localhost
    port: 8086
loadbalancerconfig:
    algorithim: Round_robin
    health_check_interval: 5m
    host: localhost
    port: 8080
servers:
    - name: server1
      url: https://www.google.com/
      alive: true
      maxrequest: 1000
    - name: server2
      url: https://www.youtube.com/
      alive: true
      maxrequest: 1000
    - name: server3
      url: http://localhost:8083
      alive: true
      maxrequest: 1000
    - name: facebook
      url: www.facebook.com
      alive: true
      maxrequest: 500
